autonomy:
  max_spend_per_run: 0.25
  allowed_tools:
    - bash
    - file_read
    - file_write
  forbidden_actions:
    - "approve work on behalf of the user"
    - "remove approval requirements without user consent"
    - "modify other Epics' policy.yml files"

escalation:
  on_error: log_and_continue
  on_ambiguity: ask_human
