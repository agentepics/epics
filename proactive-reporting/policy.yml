autonomy:
  max_spend_per_run: 0.25
  allowed_tools:
    - bash
    - file_read
    - file_write
  forbidden_actions:
    - send reports to destinations not configured in state.json
    - omit known blockers from reports
    - modify other Epics' state

escalation:
  on_error: log_and_continue
  on_ambiguity: ask_human
