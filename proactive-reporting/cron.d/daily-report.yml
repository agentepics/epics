name: daily-report
schedule: "0 17 * * *"
timezone: UTC
enabled: true
run:
  type: prompt
  prompt: |
    Produce the daily status report. Read runtime/state.json for reporting cadence,
    destinations, and per-Epic duties. For each active Epic with a reporting
    duty, collect its current status from its runtime/state.json, recent runtime/log entries,
    and current plan. Separate findings into three sections: Progress (what
    moved forward), Blockers (what is stuck and why), and Decisions (what
    needs user input). Format and deliver the report to configured
    destinations. Update runtime/state.json with delivery status. Write a runtime/log entry
    confirming delivery or noting failures.
context:
  - runtime/state.json
output:
  log: true
  update_state: true
  notify: true
