name: daily-planning
schedule: "0 7 * * *"
timezone: UTC
enabled: true
run:
  type: prompt
  prompt: |
    Run the daily planning cycle. Read runtime/state.json for the objective inventory
    and last review date. Review current objectives against runtime/ROADMAP.md.
    Inventory all active Epics in the workspace and check their runtime/state.json
    status fields. Flag any stale Epics (no runtime/log entries in 48+ hours) or
    blocked Epics. Repair misaligned Epics by updating their runtime/plans. Identify
    objective gaps where no Epic provides coverage. For each gap, draft a
    creation prompt for a new Epic. Update runtime/state.json with the portfolio
    snapshot and review timestamp. Write a runtime/log entry summarizing decisions.
context:
  - runtime/state.json
  - runtime/ROADMAP.md
output:
  log: true
  update_state: true
  notify: false
